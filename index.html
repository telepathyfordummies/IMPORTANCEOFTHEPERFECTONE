<!DOCTYPE html>
<html>
<head>
  <title>Importance of the Perfect One</title>
  <style>
    body {
      height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #f5f5f5;
      font-family: "Courier New", monospace;
      color: #4a90e2;
    }

    .time-display {
      font-size: 72px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    button {
      padding: 12px 28px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background-color: #4a90e2;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="time-display" id="timer">00:00:00</div>
  <div>
    <button id="toggleBtn">START</button>
    <button onclick="resetTimer()">REFRESH</button>
  </div>

  <script>
    let startTime = 0;
    let elapsed = 0;
    let timerInterval;
    let running = false;

    const timerDisplay = document.getElementById("timer");
    const toggleBtn = document.getElementById("toggleBtn");

    function formatTime(ms) {
      let totalSeconds = Math.floor(ms / 1000);
      let minutes = Math.floor(totalSeconds / 60);
      let seconds = totalSeconds % 60;

      // Only show centiseconds as 00
      return `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}:00`;
    }

    function updateDisplay() {
      elapsed = Date.now() - startTime;
      timerDisplay.textContent = formatTime(elapsed);
    }

    function toggleTimer() {
      if (!running) {
        // Start
        startTime = Date.now() - elapsed;
        timerInterval = setInterval(updateDisplay, 10);
        toggleBtn.textContent = "STOP";
        running = true;
      } else {
        // Stop
        clearInterval(timerInterval);
        timerInterval = null;
        running = false;
        toggleBtn.textContent = "START";

        // Check if elapsed is within the 1-second mark
        // i.e., from 1000ms up to but not including 2000ms ughghhhghg
        if (elapsed >= 1000 && elapsed < 2000) {
          window.location.href = "https://example.com"; // Replace with target when ao3 comes back... 
        }
      }
    }

    function resetTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      elapsed = 0;
      timerDisplay.textContent = "00:00:00";
      running = false;
      toggleBtn.textContent = "START";
    }

    toggleBtn.addEventListener("click", toggleTimer);
  </script>

</body>
</html>
