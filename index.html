<html>
<head>

      justify-content: center;

     .banner {
      width: 100%;
      padding: 15px 0;

      color: white;
      font-size: 20px;
      text-align: center;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      position: fixed;

    }


    .time-display {
      font-size: 72px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    button {
      padding: 12px 28px;
      font-size: 18px;
      margin: 10px;
      border: none;

    }

      opacity: 0.9;
    }

</head>
<body>
   <div class="banner">
okay time to put the wordy words in!!! </div>
  <div class="time-display" id="timer">00:00:00</div>
  <div>
    <button id="toggleBtn">START</button>
    <button onclick="resetTimer()">REFRESH</button>
  </div>

  <script>
    let startTime = 0;
    let elapsed = 0;
    let timerInterval;
    let running = false;

    const timerDisplay = document.getElementById("timer");
    const toggleBtn = document.getElementById("toggleBtn");

    function formatTime(ms) {
      let totalCentiseconds = Math.floor(ms / 10);
      let minutes = Math.floor(totalCentiseconds / 6000);
      let seconds = Math.floor((totalCentiseconds % 6000) / 100);
      let centiseconds = totalCentiseconds % 100;
      return `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}:${String(centiseconds).padStart(2,'0')}`;
    }

    function updateDisplay() {
      elapsed = Date.now() - startTime;
      timerDisplay.textContent = formatTime(elapsed);
    }

    function toggleTimer() {
      if (!running) {
        // Start
        startTime = Date.now() - elapsed;
        timerInterval = setInterval(updateDisplay, 10);
        toggleBtn.textContent = "STOP";
        running = true;
      } else {
        // Stop
        clearInterval(timerInterval);
        timerInterval = null;
        running = false;
        toggleBtn.textContent = "START";

        // Check if display is exactly "00:01:00"
        if (timerDisplay.textContent === "00:01:00") {
          window.location.href = "https://example.com"; // Replace with target when ao3 is back upuhhhhhhhh 
        }
      }
    }

    function resetTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      elapsed = 0;
      timerDisplay.textContent = "00:00:00";
      running = false;
      toggleBtn.textContent = "START";
    }

    toggleBtn.addEventListener("click", toggleTimer);
  </script>

</body>
</html>
